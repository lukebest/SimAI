experiment_name: llm_inference_64gpu_moe_mem_congestion_fullcosim_rerun
description: "64-GPU MoE simulation: memory bandwidth x network queueing/congestion"

simai_root: /home/luke/SimAI
vidur_python: /home/luke/SimAI/venv/bin/python
vidur_workdir: /home/luke/SimAI/vidur-alibabacloud
vidur_module: vidur.main

repeats: 1

common_args:
  poisson_request_interval_generator_config_qps: 100
  synthetic_request_generator_config_num_requests: 20
  length_generator_config_type: fixed
  fixed_request_length_generator_config_prefill_tokens: 1024
  fixed_request_length_generator_config_decode_tokens: 10
  interval_generator_config_type: poisson
  cluster_config_num_replicas: 16
  replica_config_pd_node_ratio: 0.5
  global_scheduler_config_type: split_wise
  replica_scheduler_config_type: split_wise
  replica_config_model_name: deepseek-671B
  replica_config_tensor_parallel_size: 4
  replica_config_num_pipeline_stages: 1
  replica_config_expert_model_parallel_size: 1
  replica_config_device: a100
  replica_config_network_device: a100_pairwise_nvlink
  random_forrest_execution_time_predictor_config_skip_cpu_overhead_modeling: true
  random_forrest_execution_time_predictor_config_profiling_time_unit: us
  random_forrest_execution_time_predictor_config_enable_tp_bandwidth_scaling: true
  random_forrest_execution_time_predictor_config_tp_comm_reference_bandwidth_gbps: 2048
  random_forrest_execution_time_predictor_config_simai_tp_full_co_simulation: true
  random_forrest_execution_time_predictor_config_simai_analytical_busbw_file: /home/luke/SimAI/example/busbw.yaml
  metrics_config_store_plots: false

backends:
  - simai_simulation

network_determinism_levels:
  - id: A1_low_congestion
    label: low_queueing
    error_rate_per_link: 0.0
    arg_overrides:
      poisson_request_interval_generator_config_qps: 100
      random_forrest_execution_time_predictor_config_enable_decode_network_contention_model: true
      random_forrest_execution_time_predictor_config_decode_network_contention_alpha: 0.10
      random_forrest_execution_time_predictor_config_decode_network_contention_max_factor: 2.5
  - id: A2_medium_congestion
    label: medium_queueing
    error_rate_per_link: 0.0
    arg_overrides:
      poisson_request_interval_generator_config_qps: 300
      random_forrest_execution_time_predictor_config_enable_decode_network_contention_model: true
      random_forrest_execution_time_predictor_config_decode_network_contention_alpha: 0.25
      random_forrest_execution_time_predictor_config_decode_network_contention_max_factor: 4.0
  - id: A3_high_congestion
    label: high_queueing
    error_rate_per_link: 0.0
    arg_overrides:
      poisson_request_interval_generator_config_qps: 600
      random_forrest_execution_time_predictor_config_enable_decode_network_contention_model: true
      random_forrest_execution_time_predictor_config_decode_network_contention_alpha: 0.40
      random_forrest_execution_time_predictor_config_decode_network_contention_max_factor: 6.0

memory_bandwidth_levels:
  - id: B1_dram
    label: dram
    bandwidth_gbps: 64
  - id: B2_hbm4
    label: hbm4
    bandwidth_gbps: 2048
  - id: B3_sram
    label: sram
    bandwidth_gbps: 80000

simai:
  topo: /home/luke/SimAI/Spectrum-X_128g_8gps_100Gbps_A100
  base_config: /home/luke/SimAI/astra-sim-alibabacloud/inputs/config/SimAI.local.conf

output:
  root: /home/luke/SimAI/results/tps_64gpu_moe_mem_congestion_fullcosim_rerun
  generated_configs_dir: /home/luke/SimAI/results/tps_64gpu_moe_mem_congestion_fullcosim_rerun/generated_configs
  runs_manifest: /home/luke/SimAI/results/tps_64gpu_moe_mem_congestion_fullcosim_rerun/runs_manifest.csv
  summary_csv: /home/luke/SimAI/results/tps_64gpu_moe_mem_congestion_fullcosim_rerun/tps_summary.csv
  effects_csv: /home/luke/SimAI/results/tps_64gpu_moe_mem_congestion_fullcosim_rerun/tps_effects.csv
